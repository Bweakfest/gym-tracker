# fly.toml app configuration file generated for nexero on 2026-04-10T14:26:08Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'nexero'
# Co-located with Supabase eu-west-1 (Dublin) to eliminate transatlantic DB round-trips.
primary_region = 'dub'

[build]

[http_service]
  internal_port = 3001
  force_https = true
  # Keep at least one machine warm to avoid cold-start delays on user actions.
  auto_stop_machines = 'suspend'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
